# Deep (VGG-16, 13 conv + 2 FC) BatchNorm baseline -- gives the #2 rank test real power.
seed: 0
device: null
model:
  arch: deep            # batchnorm defaults to true
train:
  epochs: 90
  patience: 15
  min_delta: 0.0001
  lr: 0.05
  momentum: 0.9
  weight_decay: 0.0005
  batch_size: 128
  num_workers: 2
data:
  root: ./data
  synthetic: false
  download: true
power_iter:
  iters: 200
  tol: 1.0e-7
calibration_size: 512
eval_size: 256
percentile: 99.9
checkpoint: checkpoints/vgg_deep.pt
