# Deep (VGG-16) spectral-normalized, no-BN variant -- tighter bound + depth => the decisive
# test of whether the layer-ranking correlation (#2) becomes both strong AND significant.
seed: 0
device: null
model:
  arch: deep
  spectral_norm: true
  batchnorm: false
  sn_scale: 1.4         # ~sqrt(2): offsets ReLU variance-halving so the 15-layer no-BN net trains
train:
  epochs: 90
  patience: 15
  min_delta: 0.0001
  lr: 0.05
  momentum: 0.9
  weight_decay: 0.0005
  batch_size: 128
  num_workers: 2
data:
  root: ./data
  synthetic: false
  download: true
power_iter:
  iters: 200
  tol: 1.0e-7
calibration_size: 512
eval_size: 256
percentile: 99.9
checkpoint: checkpoints/vgg_deep_sn.pt
